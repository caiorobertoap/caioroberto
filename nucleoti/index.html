<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nosso Nucleo Design</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <div class="logo-container">
                <img src="assets/images/logo.png" alt="Nosso Nucleo Design" class="logo" onerror="this.style.display='none'">
            </div>
            
            <h1>Nosso Nucleo Design</h1>
            <p class="subtitle">Sistema de Pontuacao</p>
            
            <div id="loginError" class="alert alert-error hidden"></div>
            
            <form id="loginForm" data-testid="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email" data-testid="login-email">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="********" required autocomplete="current-password" data-testid="login-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn" data-testid="login-submit">
                    Entrar
                </button>
            </form>
            
            <div class="links">
                <a href="register-lojista.html" class="link" data-testid="link-register-lojista">
                    Cadastro para <strong>Lojistas</strong>
                </a>
                <a href="register-arquiteto.html" class="link" data-testid="link-register-arquiteto">
                    Cadastro para <strong>Arquitetos</strong>
                </a>
            </div>
            
            <div class="developed-by" data-testid="developed-by">
                Desenvolvido por CRSystems
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');
            
            errorDiv.classList.add('hidden');
            errorDiv.textContent = '';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Entrando...';
            
            try {
                const user = await API.auth.login(email, password);
                setCurrentUser(user);
                redirectToDashboard(user);
            } catch (error) {
                errorDiv.textContent = error.message || 'Erro ao fazer login';
                errorDiv.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        });
    </script>

    <style>
        .developed-by {
            text-align: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
            font-size: 0.8rem;
            color: var(--color-text-muted);
            letter-spacing: 0.05em;
        }
    </style>
</body>
</html>
