<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Arquiteto - Nosso Nucleo Design</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-box" style="max-width: 500px;">
            <div class="logo-container">
                <img src="assets/images/logo.png" alt="Nosso Nucleo Design" class="logo" onerror="this.style.display='none'">
            </div>
            <h1>Cadastro Arquiteto</h1>
            <p class="subtitle">Preencha seus dados para comecar</p>
            <div id="registerMessage" class="hidden"></div>
            <form id="registerForm" data-testid="register-arquiteto-form">
                <div class="form-group">
                    <label for="name">Nome Completo *</label>
                    <input type="text" id="name" required data-testid="arquiteto-name">
                </div>
                <div class="form-group">
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" required data-testid="arquiteto-cpf">
                </div>
                <div class="form-group">
                    <label for="birth_date">Data de Nascimento *</label>
                    <input type="date" id="birth_date" required data-testid="arquiteto-birthdate">
                </div>
                <div class="form-group">
                    <label for="phone">WhatsApp *</label>
                    <input type="tel" id="phone" placeholder="(00) 00000-0000" required data-testid="arquiteto-phone">
                </div>
                <div class="form-group">
                    <label for="address">Endereco *</label>
                    <input type="text" id="address" required data-testid="arquiteto-address">
                </div>
                <div class="form-group">
                    <label for="office_id">Escritorio (opcional)</label>
                    <select id="office_id" data-testid="arquiteto-office">
                        <option value="">Sem escritorio</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="arquiteto@email.com" required data-testid="arquiteto-email">
                </div>
                <div class="form-group">
                    <label for="password">Senha *</label>
                    <input type="password" id="password" minlength="6" required data-testid="arquiteto-password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Senha *</label>
                    <input type="password" id="confirmPassword" minlength="6" required data-testid="arquiteto-confirm-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="registerBtn" data-testid="arquiteto-submit">Cadastrar</button>
            </form>
            <div class="links">
                <a href="index.html" class="link">Ja tem uma conta? <strong>Entrar</strong></a>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        async function loadOffices() {
            try {
                const offices = await API.offices.list();
                const select = document.getElementById('office_id');
                offices.forEach(office => {
                    const option = document.createElement('option');
                    option.value = office.id;
                    option.textContent = office.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar escritorios:', error);
            }
        }
        loadOffices();
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('registerMessage');
            const registerBtn = document.getElementById('registerBtn');
            
            messageDiv.className = 'hidden';
            
            if (password !== confirmPassword) {
                messageDiv.className = 'alert alert-error';
                messageDiv.textContent = 'As senhas nao coincidem';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = 'Cadastrando...';
            
            try {
                await API.auth.registerArquiteto({
                    name: document.getElementById('name').value,
                    cpf: document.getElementById('cpf').value,
                    birth_date: document.getElementById('birth_date').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    office_id: document.getElementById('office_id').value || null,
                    email: document.getElementById('email').value,
                    password: password
                });
                
                messageDiv.className = 'alert alert-success';
                messageDiv.textContent = 'Cadastro realizado com sucesso! Redirecionando para login...';
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } catch (error) {
                messageDiv.className = 'alert alert-error';
                messageDiv.textContent = error.message || 'Erro ao cadastrar';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Cadastrar';
            }
        });
    </script>
</body>
</html>
